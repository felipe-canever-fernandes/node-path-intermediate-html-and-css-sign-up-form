<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>The Odin Project: Sign Up Form</title>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- Background -->
	<header>
		<!-- Header -->
		<div class="header">
			<!-- Logo -->
			<img
				src="images/odin-logo.png"

				alt="Logo of The Odin Project, featuring a stylized geometric
					Viking face with a beard and helmet."
				
				width="48px"
			>

			<!-- Title -->
			<h1>Odin</h1>
		</div>

		<!-- Background source -->
		<p  class="source">
			Photo by

			<a href="https://unsplash.com/photos/green-leaf-plant-in-close-up-photography-25xggax4bSA">
				Halie West
			</a>
			
			on
			<a href="https://unsplash.com/">Unsplash</a>
		</p>
	</header>

	<!-- Main -->
	<main>
		<!-- Message -->
		<div class="message">
			<p>
				This is not a real online service! You know you need something
				like this in your life to help you realize your deepest dreams.
			</p>

			<p>Sign up <em>now</em> to get started.</p>
		</div>

		<!-- Form -->
		<form id="form" action="" method="post">
			<h2>Let's do this!</h2>

			<!-- Inputs -->
			<div class="inputs">
				<!-- Left column -->
				<div class="column">
					<!-- First name -->
					<div class="input">
						<label for="first-name">First name</label>
						<input
							type="text"
							name="first-name"
							id="first-name"
							required
						>
					</div>

					<!-- Email -->
					<div class="input">
						<label for="email">Email</label>

						<input
							type="email"
							name="email"
							id="email"
							required
						>
					</div>

					<!-- Password -->
					<div class="input">
						<label for="password">Password</label>

						<input
							type="password"
							name="password"
							id="password"
							required
						>
					</div>
				</div>

				<!-- Right column -->
				<div class="column">
					<!-- Last name -->
					<div class="input">
						<label for="last-name">Last name</label>
						<input
							type="text"
							name="last-name"
							id="last-name"
							required
						>
					</div>

					<!-- Phone number -->
					<div class="input">
						<label for="phone-number">Phone number</label>
						<input
							type="tel"
							name="phone-number"
							id="phone-number"
						>
					</div>

					<!-- Password confirmation -->
					<div class="input">
						<label for="password-confirmation">
							Confirm password
						</label>

						<input
							type="text"
							name="password-confirmation"
							id="password-confirmation"
							required
						>
					</div>
				</div>
			</div>
		</form>

		<!-- Form continuation -->
		<div class="continuation">
			<!-- Button -->
			<button type="submit" form="form">Create account</button>

			<p>
				Already have an account?
				<a href="">Log in</a>
			</p>
		</div>
	</main>
</body>

</html>
